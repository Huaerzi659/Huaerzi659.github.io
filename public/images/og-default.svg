<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Waltz, Then Think default share image</title>
  <desc id="desc">A cyberpunk and scroll inspired share image for the Waltz, Then Think blog.</desc>
  <defs>
