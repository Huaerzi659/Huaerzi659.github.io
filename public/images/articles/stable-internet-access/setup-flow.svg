<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">新手配置流程图</title>
  <desc id="desc">展示从复制订阅、安装客户端、导入订阅、选择规则模式、选择节点到测试访问的六步流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef8f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#173a4b" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#5f7f88"/>
    </marker>
  </defs>
  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>
  <text x="600" y="72" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#12323d">第一次配置，照这个顺序走</text>
  <text x="600" y="116" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#5b737a">每一步只做一件事，出问题也更容易定位</text>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <g filter="url(#shadow)">
      <rect x="84" y="178" width="302" height="156" rx="22" fill="#ffffff"/>
      <circle cx="126" cy="218" r="24" fill="#2f9a8c"/>
      <text x="126" y="226" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">1</text>
      <text x="164" y="216" font-size="25" font-weight="700" fill="#12323d">复制订阅链接</text>
      <text x="164" y="258" font-size="18" fill="#5b737a">从服务商后台复制</text>
      <text x="164" y="290" font-size="18" fill="#5b737a">不要公开分享</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="449" y="178" width="302" height="156" rx="22" fill="#ffffff"/>
      <circle cx="491" cy="218" r="24" fill="#4d7dd8"/>
      <text x="491" y="226" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">2</text>
      <text x="529" y="216" font-size="25" font-weight="700" fill="#12323d">安装客户端</text>
      <text x="529" y="258" font-size="18" fill="#5b737a">电脑选 Clash Verge Rev</text>
      <text x="529" y="290" font-size="18" fill="#5b737a">手机按系统选择</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="814" y="178" width="302" height="156" rx="22" fill="#ffffff"/>
      <circle cx="856" cy="218" r="24" fill="#f4a33d"/>
      <text x="856" y="226" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">3</text>
      <text x="894" y="216" font-size="25" font-weight="700" fill="#12323d">导入订阅</text>
      <text x="894" y="258" font-size="18" fill="#5b737a">找到 Profiles / 配置</text>
      <text x="894" y="290" font-size="18" fill="#5b737a">粘贴 URL 并更新</text>
    </g>

    <path d="M398 256 H431" stroke="#5f7f88" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M763 256 H796" stroke="#5f7f88" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="84" y="426" width="302" height="156" rx="22" fill="#ffffff"/>
      <circle cx="126" cy="466" r="24" fill="#8d6bd8"/>
      <text x="126" y="474" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">4</text>
      <text x="164" y="464" font-size="25" font-weight="700" fill="#12323d">选择规则模式</text>
      <text x="164" y="506" font-size="18" fill="#5b737a">国内直连，海外走代理</text>
      <text x="164" y="538" font-size="18" fill="#5b737a">日常使用更省心</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="449" y="426" width="302" height="156" rx="22" fill="#ffffff"/>
      <circle cx="491" cy="466" r="24" fill="#d65f5f"/>
      <text x="491" y="474" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">5</text>
      <text x="529" y="464" font-size="25" font-weight="700" fill="#12323d">选一个近节点</text>
      <text x="529" y="506" font-size="18" fill="#5b737a">香港、日本、新加坡</text>
      <text x="529" y="538" font-size="18" fill="#5b737a">先收藏 2 到 3 个备用</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="814" y="426" width="302" height="156" rx="22" fill="#ffffff"/>
      <circle cx="856" cy="466" r="24" fill="#2f9a8c"/>
      <text x="856" y="474" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">6</text>
      <text x="894" y="464" font-size="25" font-weight="700" fill="#12323d">打开并测试</text>
      <text x="894" y="506" font-size="18" fill="#5b737a">开启系统代理</text>
      <text x="894" y="538" font-size="18" fill="#5b737a">浏览器访问目标网站</text>
    </g>

    <path d="M398 504 H431" stroke="#5f7f88" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M763 504 H796" stroke="#5f7f88" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  </g>

  <rect x="240" y="652" width="720" height="58" rx="18" fill="#12323d"/>
  <text x="600" y="688" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="21" font-weight="700" fill="#ffffff">卡住时按顺序排查：换节点 → 更新订阅 → 检查系统代理 → 重启客户端</text>
</svg>
